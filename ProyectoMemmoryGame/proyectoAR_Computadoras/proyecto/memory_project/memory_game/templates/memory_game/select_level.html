<!doctype html>
<html lang="es">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seleccionar nivel | Memory Game</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#070A14;
      --cyan:#00F5FF;
      --pink:#FF2CDF;
      --yellow:#FFD23F;
      --purple:#8E2DE2;
      --text:#EAF2FF;
    }

    body{
      min-height:100vh;
      margin:0;
      color:var(--text);
      background:
        radial-gradient(circle at 25% 15%, rgba(0,245,255,.16), transparent 45%),
        radial-gradient(circle at 75% 20%, rgba(255,44,223,.16), transparent 45%),
        linear-gradient(180deg, #050714 0%, var(--bg) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: "Press Start 2P", "Verdana", "Segoe UI", system-ui, sans-serif;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,44,223,.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 75%);
      pointer-events:none;
      opacity:.55;
    }

    .panel{
      width:100%;
      max-width:560px;
      padding:30px;
      border-radius:18px;
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 0 18px rgba(0,245,255,.22),
        0 0 38px rgba(255,44,223,.16);
      backdrop-filter: blur(10px);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .panel::after{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:20px;
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--yellow), var(--purple), var(--cyan));
      filter: blur(16px);
      opacity:.28;
      z-index:-1;
    }

    .title{
      margin:0 0 10px 0;
      font-size:18px;
      text-shadow: 0 0 10px rgba(0,245,255,.35);
    }

    .subtitle{
      font-family: system-ui, sans-serif;
      opacity:.75;
      margin-bottom:18px;
    }

    .btn-level{
      font-family: system-ui, sans-serif;
      font-weight:900;
      padding:12px 14px;
      border:none;
      border-radius:12px;
      color:#070A14;
      text-decoration:none;
      display:inline-block;
      text-align:center;
    }

    .basic{ background: linear-gradient(90deg, #00ff9f, var(--yellow)); }
    .medium{ background: linear-gradient(90deg, var(--yellow), var(--pink)); }
    .hard{ background: linear-gradient(90deg, var(--pink), var(--cyan)); }

    .btn-level:hover{ opacity:.95; }

    .logout{
      display:inline-block;
      margin-top:18px;
      font-family: system-ui, sans-serif;
      font-weight:800;
      color:var(--cyan);
      text-decoration:none;
    }
    .logout:hover{ text-decoration:underline; }
  </style>
</head>

<body>

<audio id="menuMusic" loop>
    <source src="{% static 'sounds/fondonormal.mp3' %}" type="audio/mpeg">
</audio>

  <script>
  const music = document.getElementById("menuMusic");
  music.volume = 0.3;

  let musicStarted = false;

  // Iniciar música en el primer click
  document.body.addEventListener('click', () => {
      if(!musicStarted){
          music.play().catch(e => console.log("Autoplay bloqueado por navegador:", e));
          musicStarted = true;
      }
  });

  // Intentar autoplay (para navegadores que lo permiten)
  window.addEventListener('load', () => {
      music.play().catch(e => console.log("Autoplay no permitido:", e));
  });

  // Pausar cuando salgas de la página
  window.addEventListener("beforeunload", () => {
      music.pause();
      music.currentTime = 0;
  });
  </script>

  <div class="panel">
    <h1 class="title">🎯 SELECCIONA UN NIVEL</h1>
    <p class="subtitle">Elige la dificultad para comenzar</p>

    <div class="d-grid gap-3">
      <a class="btn btn-level basic" href="{% url 'play_basic' %}">BÁSICO</a>
      <a class="btn btn-level medium" href="{% url 'play_medium' %}">MEDIO</a>
      <a class="btn btn-level hard" href="{% url 'play_hard' %}">AVANZADO</a>
    </div>

    <a class="logout" href="{% url 'logout' %}">Cerrar sesión</a>
  </div>
</body>
</html>

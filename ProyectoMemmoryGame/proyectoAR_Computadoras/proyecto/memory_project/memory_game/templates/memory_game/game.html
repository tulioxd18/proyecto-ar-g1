<!doctype html>
<html lang="es">
<head>
{% load static %} 

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Juego | {{ level_name }}</title>
<meta name="csrf-token" content="{{ csrf_token }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"Segoe UI",sans-serif;
    color:#EAF2FF;
    background:
    radial-gradient(circle at 20% 10%, rgba(255,44,223,.25), transparent 45%),
    radial-gradient(circle at 80% 15%, rgba(0,245,255,.25), transparent 45%),
    linear-gradient(180deg,#050714 0%,#070A14 100%);
    padding:24px;
}

.vc-card{
    width:100%;
    max-width:760px;
    padding:22px;
    border-radius:18px;
    background:rgba(10,10,20,0.55);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.14);
}

.grid{
    display:grid;
    gap:12px;
    margin-top:15px;
}

.card-tile{
    aspect-ratio:1/1;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:38px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
}

.revealed{ background:rgba(0,245,255,.1); }
.matched{ background:rgba(0,255,159,.15); cursor:default; }

.pill{
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    font-weight:700;
}

.btn-vc{
    border:none;
    font-weight:900;
    color:#071018;
    background:linear-gradient(90deg,#00F5FF,#FF2CDF);
}

.btn-nav {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.15);
    color: #EAF2FF;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}
.btn-nav:hover {
    background: rgba(0, 245, 255, 0.15);
    border-color: #00F5FF;
    color: #00F5FF;
}
.btn-nav.pink:hover {
    background: rgba(255, 44, 223, 0.15);
    border-color: #FF2CDF;
    color: #FF2CDF;
}

</style>
</head>

<body>


<audio id="bgAudio"></audio>
<audio id="sfxAudio"></audio>

<div class="vc-card">
    <div class="d-flex justify-content-between mb-3">
        <div>
            <h4>🎮 {{ level_name }}</h4>
            <small>Jugador: {{ request.user.username }}</small>
        </div>

        <div class="d-flex gap-2 align-items-center">
            <div class="pill">⏱️ <span id="timeLeft">0</span>s</div>
            <div class="pill">❤️ <span id="attemptsLeft">0</span></div>
            <a class="btn-nav" href="{% url 'profile' %}">👤 Perfil</a>
            <a class="btn-nav pink" href="{% url 'select_level' %}">↩ Volver</a>
        </div>
    </div>

    <!-- El botón de iniciar mantendrá su estilo, sin usar modales -->
    <button id="startBtn" class="btn btn-vc w-100 mb-3 py-3" style="font-size:16px; border-radius:12px;">INICIAR PARTIDA</button>

    <div class="grid" id="grid"></div>
    <div id="status" class="mt-3 text-center" style="font-size: 20px; font-weight: bold; min-height: 30px;"></div>
</div>

<script>
const bgAudio = document.getElementById("bgAudio");
const sfxAudio = document.getElementById("sfxAudio");

const sounds = {
    basico: {
        bg: "{% static 'sounds/nivl1.mp3' %}",
        win: "{% static 'sounds/ganar.mp3' %}",
        lose: "{% static 'sounds/derrota.mp3' %}"
    },
    medio: {
        bg: "{% static 'sounds/nivel2.mp3' %}",
        win: "{% static 'sounds/ganar.mp3' %}",
        lose: "{% static 'sounds/derrota.mp3' %}"
    },
    avanzado: {
        bg: "{% static 'sounds/nivel3.mp3' %}",
        win: "{% static 'sounds/ganar.mp3' %}",
        lose: "{% static 'sounds/derrota.mp3' %}"
    }
};

function getNivel(){
    const n = "{{ level_name }}".toLowerCase();
    if(n.includes("basico") || n.includes("básico")) return "basico";
    if(n.includes("medio")) return "medio";
    return "avanzado";
}

function playAudio(src, isBg=true){
    const targetAudio = isBg ? bgAudio : sfxAudio;
    targetAudio.pause();
    targetAudio.currentTime = 0;
    targetAudio.src = src;
    targetAudio.loop = isBg;
    targetAudio.volume = isBg ? 0.3 : 0.8;

    if (!isBg) {
        bgAudio.pause();
    } else {
        sfxAudio.pause();
        sfxAudio.currentTime = 0;
    }

    let playPromise = targetAudio.play();
    if(playPromise !== undefined) {
        playPromise.catch(error => console.log("Autoplay con sonido bloqueado por el navegador."));
    }
}

window.GAME_CONFIG = {
    level:"{{ level_name }}",
    timeLimit:Number("{{ time_limit|default:60 }}"),
    attempts:Number("{{ attempts|default:6 }}"), // Extraemos los intentos de Django directamente
    gridSize: 4 // Forzamos grid de 4 siempre
};

const grid = document.getElementById("grid");
const timeEl = document.getElementById("timeLeft");
const attemptsEl = document.getElementById("attemptsLeft");
const statusEl = document.getElementById("status");
const startBtn = document.getElementById("startBtn");

const CFG = window.GAME_CONFIG;
const ALL_EMOJIS = ["🍉","🍒","🍋","🍇","🍓","🍑","🍍","🥝","🍎","🥭","🍌","🍐","🥥","🍊","🍈","🍏","🥕","🌽","🍆","🥔"];

let EMOJIS = [], deck = [], first=null, second=null, lock=false, matches=0, attempts=0, time=0, timer=null, isGameOver=false;

function setupLevel(){
    EMOJIS = ALL_EMOJIS.slice(0, 8); // Siempre 8 parejas para 4x4
    attempts = CFG.attempts; // Usamos los intentos que vienen de views.py según la dificultad
}

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function initDeck(){
    deck = shuffle([...EMOJIS,...EMOJIS].map((e,i)=>({id:i,emoji:e,matched:false})));
}

function render(showAll=false){
    grid.innerHTML="";
    grid.style.gridTemplateColumns=`repeat(4,1fr)`; // Forzamos las 4 columnas

    deck.forEach((card,i)=>{
        const btn=document.createElement("button");
        btn.className="card-tile";
        btn.type="button";
        btn.textContent = showAll ? card.emoji : "🂠";
        if(showAll) btn.classList.add("revealed");
        btn.onclick=()=>flip(i,btn);
        grid.appendChild(btn);
    });
}

function updateHUD(){
    timeEl.textContent=time;
    attemptsEl.textContent=attempts;
}

function startGame(){
    startBtn.style.display = "none";
    isGameOver = false;

    const lvl = getNivel();
    playAudio(sounds[lvl].bg, true);

    setupLevel();
    initDeck();
    render(true);

    matches=0;
    first=null;
    second=null;
    time=CFG.timeLimit;
    updateHUD();
    statusEl.innerHTML="🎮 Observa las cartas";

    clearInterval(timer);
    setTimeout(()=>{
        render(false);
        statusEl.innerHTML="🎮 Encuentra las parejas";
        timer=setInterval(()=>{
            time--;
            updateHUD();
            if(time<=0) endGame(false,"💀 ⏰ Tiempo agotado");
        },1000);
    },4000);
}

function flip(index,btn){
    if(lock || deck[index].matched || attempts<=0) return;
    
    // Ignorar si hace clic en la misma carta
    if(first && first.index === index) return;

    btn.textContent=deck[index].emoji;

    if(!first){
        first={index,btn};
        return;
    }

    second={index,btn};
    lock=true;

    if(deck[first.index].emoji===deck[second.index].emoji){
        deck[first.index].matched=true;
        deck[second.index].matched=true;

        matches++;
        updateHUD();
        resetTurn();

        if(matches===EMOJIS.length){
            endGame(true,"🏆 ¡Ganaste!");
        }
    } else {
        attempts--;
        updateHUD();
        setTimeout(()=>{
            // IMPORTANTE: Ocultar ambas cartas correctamente (en tu código original solo se ocultaba btn)
            if (first && first.btn) first.btn.textContent="🂠";
            btn.textContent="🂠";
            resetTurn();

            if(attempts<=0){
                endGame(false,"💀 Sin intentos...");
            }
        },700);
    }
}

function resetTurn(){
    first=null;
    second=null;
    lock=false;
}

// Mantenemos la funcionalidad de guardar estadísticas
function saveResult(win, durationSeconds){
    const levelMap = { "básico": "basico", "medio": "medio", "avanzado": "avanzado" };
    const body = new URLSearchParams();
    body.append("level", levelMap[CFG.level.toLowerCase()] || CFG.level.toLowerCase());
    body.append("win", win.toString());
    body.append("duration", durationSeconds.toString());

    fetch("{% url 'save_result' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content,
            "Content-Type": "application/x-www-form-urlencoded",
        },
        body: body.toString(),
    }).catch((error) => console.error("Error guardando resultado:", error));
}


function endGame(win,msg){
    if(isGameOver) return;
    isGameOver = true;

    clearInterval(timer);
    lock = true;
    statusEl.innerHTML=msg;
    
    startBtn.style.display = "block";
    startBtn.textContent="🕹️ JUGAR DE NUEVO";
    
    // Evitar múltiples clics al inicio
    startBtn.disabled = true;
    setTimeout(() => startBtn.disabled = false, 1500);

    const elapsed = CFG.timeLimit - time;
    const lvl = getNivel();

    if(win){
        playAudio(sounds[lvl].win, false);
    } else {
        playAudio(sounds[lvl].lose, false);
    }
    
    saveResult(win, elapsed);
}

startBtn.onclick = ()=>{
    startGame();
};

updateHUD();
statusEl.innerHTML="Presiona INICIAR PARTIDA";

</script>

</body>
</html>

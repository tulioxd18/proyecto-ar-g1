<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Memory Game</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#070A14;
      --cyan:#00F5FF;
      --pink:#FF2CDF;
      --yellow:#FFD23F;
      --purple:#8E2DE2;
      --text:#EAF2FF;
    }

    body{
      min-height:100vh;
      margin:0;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,44,223,.18), transparent 45%),
        radial-gradient(circle at 80% 15%, rgba(0,245,255,.16), transparent 45%),
        linear-gradient(180deg, #050714 0%, var(--bg) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: "Press Start 2P", "Verdana", "Segoe UI", system-ui, sans-serif;
    }

    /* Grid retro al fondo */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(0,245,255,.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,.08) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 75%);
      pointer-events:none;
      opacity:.55;
    }

    .arcade-card{
      width:100%;
      max-width:460px;
      padding:28px 26px;
      border-radius:18px;
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 0 18px rgba(0,245,255,.25),
        0 0 38px rgba(255,44,223,.18);
      backdrop-filter: blur(10px);
      position:relative;
      overflow:hidden;
    }

    /* Borde glow */
    .arcade-card::after{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:20px;
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--yellow), var(--purple), var(--cyan));
      filter: blur(14px);
      opacity:.35;
      z-index:-1;
    }

    .title{
      font-size:18px;
      letter-spacing:1px;
      text-align:center;
      margin:0 0 10px 0;
      text-shadow: 0 0 10px rgba(0,245,255,.35);
    }

    .subtitle{
      font-family: system-ui, sans-serif;
      text-align:center;
      margin:0 0 18px 0;
      opacity:.75;
    }

    .form-label{
      font-family: system-ui, sans-serif;
      font-weight:600;
      opacity:.9;
    }

    .form-control{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      color:var(--text);
      padding:12px 12px;
    }
    .form-control:focus{
      background: rgba(255,255,255,.08);
      border-color: rgba(0,245,255,.55);
      box-shadow: 0 0 0 .2rem rgba(0,245,255,.12);
      color:var(--text);
    }

    .btn-arcade{
      font-family: system-ui, sans-serif;
      font-weight:800;
      border:none;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      color:#071018;
      padding:12px 14px;
      box-shadow: 0 0 18px rgba(0,245,255,.18);
    }
    .btn-arcade:hover{ opacity:.95; }

    .link{
      color:var(--cyan);
      text-decoration:none;
      font-family: system-ui, sans-serif;
      font-weight:700;
    }
    .link:hover{ text-decoration:underline; }

    .alert{
      font-family: system-ui, sans-serif;
    }

    .footer-note{
      font-family: system-ui, sans-serif;
      text-align:center;
      margin-top:14px;
      opacity:.75;
    }
  </style>
</head>

<body>
  <div class="arcade-card">
    <h1 class="title">🕹️ MEMORY GAME</h1>
    <p class="subtitle">Inicia sesión para comenzar</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger text-center mb-3">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input class="form-control" name="username" placeholder="Nombre de Usuario" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required>
      </div>

      <button class="btn btn-arcade w-100">ENTRAR</button>
    </form>

    <div class="footer-note">
      ¿No tienes cuenta?
      <a class="link" href="{% url 'register' %}">Regístrate</a>
    </div>
  </div>
</body>
</html>
